<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DHA — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#050914;--card:#080e1f;--blue:#1E64FF;--cyan:#00D4FF;--gold:#FFD700;--green:#00FF88;--white:#E8F4FF;--dim:rgba(232,244,255,0.4);--border:rgba(30,100,255,0.15);--red:#FF4466;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Exo 2',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(30,100,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(30,100,255,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.bg-glow-1{position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(ellipse,rgba(30,100,255,0.12) 0%,transparent 70%);pointer-events:none;}
.bg-glow-2{position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(ellipse,rgba(0,212,255,0.08) 0%,transparent 70%);pointer-events:none;}
.container{position:relative;z-index:10;width:100%;max-width:440px;padding:24px 20px;display:flex;flex-direction:column;align-items:center;}
.logo-dha{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;letter-spacing:8px;color:var(--white);text-shadow:0 0 40px rgba(30,100,255,0.8);line-height:1;text-align:center;}
.logo-sub{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:5px;color:rgba(0,212,255,0.6);margin-top:6px;margin-bottom:32px;text-align:center;}
.card{width:100%;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px 32px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.card-title{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:var(--white);margin-bottom:6px;letter-spacing:1px;}
.card-sub{font-size:13px;color:var(--dim);margin-bottom:28px;line-height:1.5;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.form-label{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--dim);}
.form-input{padding:13px 16px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--white);font-family:'Exo 2',sans-serif;font-size:14px;outline:none;transition:all .2s;width:100%;}
.form-input::placeholder{color:rgba(255,255,255,0.2);}
.form-input:focus{border-color:rgba(0,212,255,0.4);background:rgba(0,212,255,0.04);}
.password-wrap{position:relative;}
.password-wrap .form-input{padding-right:44px;}
.eye-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--dim);font-size:18px;transition:color .2s;}
.error-msg{display:none;padding:12px 16px;border-radius:10px;background:rgba(255,68,102,0.1);border:1px solid rgba(255,68,102,0.25);font-size:12px;color:var(--red);margin-bottom:16px;text-align:center;}
.error-msg.show{display:block;}
.btn-submit{width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#000;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;letter-spacing:2px;border:none;cursor:pointer;margin-top:8px;box-shadow:0 6px 30px rgba(0,212,255,0.3);transition:all .2s;}
.btn-submit:hover{transform:translateY(-2px);}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:24px 0;}
.loading-bar{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--blue),var(--cyan));z-index:9999;transition:width .3s;}
.success-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(5,9,20,0.95);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px;}
.success-overlay.show{display:flex;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>
<div class="loading-bar" id="loading-bar"></div>
<div class="success-overlay" id="success-overlay">
  <div style="font-size:72px;margin-bottom:24px;">🚀</div>
  <div style="font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:var(--white);margin-bottom:12px;">Bon retour <span id="success-name" style="color:var(--cyan);">Hustler</span> !</div>
  <div style="font-size:14px;color:var(--dim);line-height:1.7;">Connexion réussie. Redirection...<br/><br/><span style="font-family:'Orbitron',sans-serif;font-size:12px;color:var(--gold);">+10 XP ⚡ Connexion quotidienne</span></div>
</div>
<div class="container">
  <div class="logo-dha">DHA</div>
  <div class="logo-sub">DIGITAL HUSTLER ACADEMY</div>
  <div class="card">
    <div class="card-title">Connexion</div>
    <div class="card-sub">Entre tes identifiants pour accéder à ton dashboard.</div>
    <div class="error-msg" id="error-msg">Email ou mot de passe incorrect.</div>
    <div class="form-group">
      <label class="form-label">EMAIL</label>
      <input class="form-input" id="email" type="email" placeholder="ton@email.com" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <div class="form-group">
      <label class="form-label">MOT DE PASSE</label>
      <div class="password-wrap">
        <input class="form-input" id="password" type="password" placeholder="Ton mot de passe" onkeydown="if(event.key==='Enter')login()"/>
        <div class="eye-toggle" onclick="togglePwd()">👁</div>
      </div>
    </div>
    <button class="btn-submit" id="btn-login" onclick="login()">▶ SE CONNECTER</button>
    <div class="divider"></div>
    <div style="text-align:center;">
      <div style="font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--dim);margin-bottom:12px;">PAS ENCORE MEMBRE ?</div>
      <a href="dha-inscription.html" style="display:inline-block;padding:12px 28px;border-radius:12px;border:1px solid rgba(0,212,255,0.3);background:rgba(0,212,255,0.06);font-family:'Orbitron',sans-serif;font-size:10px;font-weight:900;color:var(--cyan);text-decoration:none;letter-spacing:2px;">CRÉER MON COMPTE →</a>
    </div>
  </div>
  <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--dim);">
    <a href="index.html" style="color:var(--cyan);text-decoration:none;">← Retour à l'accueil</a>
  </div>
</div>
<script>
const SUPABASE_URL='https://kdetwppxsfoagyndrlzr.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZXR3cHB4c2ZvYWd5bmRybHpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzM3NjQsImV4cCI6MjA5MjgwOTc2NH0.OodaFQKEHcncDYdO6uM121NAUbyxD4UxpptSjzzZOi0';
function togglePwd(){const i=document.getElementById('password');const e=document.querySelector('.eye-toggle');i.type=i.type==='password'?'text':'password';e.style.color=i.type==='text'?'var(--cyan)':'var(--dim)';}
function showError(msg){const e=document.getElementById('error-msg');e.textContent=msg;e.classList.add('show');}
async function login(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  if(!email||!password){showError('Remplis tous les champs.');return;}
  const btn=document.getElementById('btn-login');
  btn.textContent='CONNEXION EN COURS...';btn.disabled=true;
  document.getElementById('error-msg').classList.remove('show');
  const bar=document.getElementById('loading-bar');bar.style.width='60%';
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/membres?email=eq.'+encodeURIComponent(email)+'&select=*',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const data=await res.json();
    if(!data||data.length===0){bar.style.width='0%';btn.textContent='▶ SE CONNECTER';btn.disabled=false;showError('Aucun compte trouvé avec cet email.');return;}
    const member=data[0];
    bar.style.width='100%';
    localStorage.setItem('dha_member',JSON.stringify({...member,password}));
    document.getElementById('success-name').textContent=member.prenom||'Hustler';
    document.getElementById('success-overlay').classList.add('show');
    setTimeout(()=>window.location.href='dha-dashboard.html',2000);
  }catch(err){bar.style.width='0%';btn.textContent='▶ SE CONNECTER';btn.disabled=false;showError('Erreur de connexion. Réessaie.');}
}
const stored=localStorage.getItem('dha_member');
if(stored)window.location.href='dha-dashboard.html';
</script>
</body>
</html>
